# TwitterExplorer Model Configuration
# Using the latest OpenAI GPT-5-mini model for enhanced performance

default_provider: openai

models:
  # Core investigation operations - using latest GPT-5-mini
  strategic_coordinator: "gpt-5-mini"
  finding_evaluator: "gpt-5-mini"
  insight_synthesizer: "gpt-5-mini"
  emergent_questions: "gpt-5-mini"
  
  # Analysis operations - using latest GPT-5-mini
  cross_reference: "gpt-5-mini"
  temporal_analysis: "gpt-5-mini"
  
  # Fallback models
  fallback_primary: "gpt-5-mini"
  fallback_secondary: "gemini/gemini-2.5-flash"

# Provider-specific settings
provider_settings:
  gemini:
    temperature: 0.3
    max_tokens: 8000
  openai:
    temperature: 0.3
    max_tokens: 4000